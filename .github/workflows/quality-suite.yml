name: 🔍 Quality Suite

on:
  schedule:
    - cron: '0 1 * * *'
  pull_request:
    paths:
      - 'snaptxt/backend/**'
      - 'snaptxt/postprocess/**'
      - 'experiments/samples/**'
      - 'experiments/scripts/run_quality_samples.py'
      - 'scripts/run_quality_suite.ps1'
      - 'tools/quality_suite.py'
      - 'tools/rule_diff.py'
      - '.github/workflows/quality-suite.yml'
  workflow_dispatch:
    inputs:
      min_quality:
        description: 'Fail when overall quality drops below this value'
        required: false
        default: '0.9'
        type: string

jobs:
  quality-suite:
    name: Run Stage 3 + Quality Metrics
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: pip

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if (Test-Path "requirements.txt") {
            pip install -r requirements.txt
          }
          if (Test-Path "requirements_pc.txt") {
            pip install -r requirements_pc.txt
          }
        shell: pwsh

      - name: 🧪 Run Quality Suite
        run: |
          $minQuality = "${{ github.event.inputs.min_quality }}"
          if (-not $minQuality) {
            $minQuality = '0.9'
          }
          Write-Host "Quality gate threshold: $minQuality"
          $tagThresholds = @(
            'article=0.9',
            'synthetic=0.95',
            'stress=0.85',
            'table=0.9',
            'lowlight=0.8'
          )
          ./scripts/run_quality_suite.ps1 -SampleIncludeText -SkipRuleDiff -MinQuality $minQuality -TagThreshold $tagThresholds
        shell: pwsh

      - name: ⬆️ Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-suite-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            reports/quality_suite_report.json
            experiments/results/quality_samples.json
